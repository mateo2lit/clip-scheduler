name: AI Clip Burn (Subtitle Burn-In)

on:
  workflow_dispatch:
    inputs:
      burn_job_id:
        description: "ai_clip_burn_jobs row ID"
        required: true
      source_clip_url:
        description: "Unused — workflow fetches path from DB directly"
        required: false
        default: ""
      output_path:
        description: "Supabase Storage path for burned output"
        required: true
      mode:
        description: "portrait_blur or landscape"
        required: false
        default: "landscape"
      team_id:
        description: "Team ID"
        required: true
      user_id:
        description: "User ID"
        required: true
      clip_title:
        description: "Clip title for overlay"
        required: false
        default: ""

jobs:
  burn:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check ffmpeg
        run: |
          if command -v ffmpeg &>/dev/null; then
            echo "ffmpeg ready: $(ffmpeg -version 2>&1 | head -1)"
          else
            sudo apt-get update -qq || true
            sudo apt-get install -y --no-install-recommends ffmpeg || true
          fi
          ffmpeg -version 2>&1 | head -1

      - name: Install fonts
        run: |
          sudo apt-get install -y --no-install-recommends fonts-liberation fonts-noto-core 2>/dev/null || true
          sudo mkdir -p /usr/local/share/fonts/clip-dash || true
          BASE="https://github.com/google/fonts/raw/main/ofl"
          wget -q --timeout=15 "${BASE}/montserrat/static/Montserrat-Bold.ttf" -O /usr/local/share/fonts/clip-dash/Montserrat-Bold.ttf || true
          wget -q --timeout=15 "${BASE}/montserrat/static/Montserrat-Black.ttf" -O /usr/local/share/fonts/clip-dash/Montserrat-Black.ttf || true
          wget -q --timeout=15 "${BASE}/oswald/static/Oswald-Bold.ttf" -O /usr/local/share/fonts/clip-dash/Oswald-Bold.ttf || true
          fc-cache -f 2>/dev/null || true

      - name: Mark burn job as burning
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_burn_jobs?id=eq.${{ inputs.burn_job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"burning\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Download source clip
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BURN_JOB_ID: ${{ inputs.burn_job_id }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error

          def write_status(s):
              with open("/tmp/dl_status.txt", "w") as f:
                  f.write(str(s))

          write_status("starting")

          supabase_url = os.environ.get("SUPABASE_URL", "")
          service_key  = os.environ.get("SERVICE_KEY", "")
          burn_job_id  = os.environ.get("BURN_JOB_ID", "")

          print(f"burn_job_id={burn_job_id}, supabase_url={supabase_url[:40]}", flush=True)

          if not supabase_url or not service_key or not burn_job_id:
              write_status("missing-env")
              raise RuntimeError(f"Missing env: url={bool(supabase_url)} key={bool(service_key)} id={bool(burn_job_id)}")

          # 1. Fetch source_clip_path from DB
          write_status("db-fetch")
          try:
              req = urllib.request.Request(
                  f"{supabase_url}/rest/v1/ai_clip_burn_jobs?id=eq.{burn_job_id}&select=source_clip_path",
                  headers={"Authorization": f"Bearer {service_key}", "apikey": service_key}
              )
              with urllib.request.urlopen(req, timeout=15) as resp:
                  rows = json.loads(resp.read().decode())
              print(f"DB rows: {rows}", flush=True)
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:200]
              write_status(f"db-http-{e.code}")
              raise RuntimeError(f"DB fetch HTTP {e.code}: {body}")
          except Exception as e:
              write_status(f"db-err-{type(e).__name__}")
              raise RuntimeError(f"DB fetch error: {e}")

          if not rows or not rows[0].get("source_clip_path"):
              write_status("path-missing")
              raise RuntimeError(f"source_clip_path empty/missing. rows={rows}")

          clip_path = rows[0]["source_clip_path"]
          print(f"Clip path: {clip_path}", flush=True)
          # Save path separately so failure handler can include it
          with open("/tmp/clip_path.txt", "w") as f:
              f.write(clip_path)
          # 2. Direct authenticated download — service role key has full storage access
          download_url = f"{supabase_url}/storage/v1/object/authenticated/clips/{clip_path}"
          write_status("downloading")
          print(f"Downloading (authenticated): {download_url[:80]}...", flush=True)

          try:
              dl_req = urllib.request.Request(
                  download_url,
                  headers={
                      "Authorization": f"Bearer {service_key}",
                      "apikey": service_key,
                  }
              )
              with urllib.request.urlopen(dl_req, timeout=300) as resp:
                  write_status(str(resp.status))
                  with open("/tmp/clip.mp4", "wb") as f:
                      while True:
                          chunk = resp.read(8 * 1024 * 1024)
                          if not chunk:
                              break
                          f.write(chunk)
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:300]
              write_status(str(e.code))
              raise RuntimeError(f"Download HTTP {e.code}: {e.reason} — {body}")
          except Exception as e:
              write_status(f"dl-err-{type(e).__name__}")
              raise RuntimeError(f"Download error: {e}")

          size = os.path.getsize("/tmp/clip.mp4")
          if size == 0:
              write_status("empty-file")
              raise RuntimeError("Downloaded file is empty")
          write_status("ok")
          print(f"Downloaded: {size:,} bytes", flush=True)
          PYEOF

      - name: Fetch subtitle data from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BURN_JOB_ID: ${{ inputs.burn_job_id }}
          BURN_MODE_INPUT: ${{ inputs.mode }}
          CLIP_TITLE_INPUT: ${{ inputs.clip_title }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          words = []
          style = {}
          clip_title = os.environ.get("CLIP_TITLE_INPUT", "") or ""
          db_mode = os.environ.get("BURN_MODE_INPUT", "landscape") or "landscape"

          try:
              supabase_url = os.environ["SUPABASE_URL"]
              service_key  = os.environ["SERVICE_KEY"]
              burn_job_id  = os.environ["BURN_JOB_ID"]

              req = urllib.request.Request(
                  f"{supabase_url}/rest/v1/ai_clip_burn_jobs?id=eq.{burn_job_id}&select=subtitle_data,subtitle_style,mode",
                  headers={"Authorization": f"Bearer {service_key}", "apikey": service_key}
              )
              with urllib.request.urlopen(req) as resp:
                  body = resp.read().decode("utf-8")

              rows = json.loads(body)
              if rows:
                  row = rows[0]
                  words = row.get("subtitle_data") or []
                  style = row.get("subtitle_style") or {}
                  db_mode = row.get("mode") or db_mode
                  print(f"Fetched OK: mode={db_mode}, words={len(words)}, title={clip_title[:60]!r}", flush=True)
              else:
                  print(f"WARNING: burn job not found in DB, proceeding without subtitle data", flush=True)

          except Exception as e:
              print(f"WARNING: DB fetch failed ({type(e).__name__}: {e})", flush=True)
              print("Continuing without subtitle data. Mode from workflow input.", flush=True)

          finally:
              with open("/tmp/subtitle_data.json", "w") as f:
                  json.dump(words, f)
              with open("/tmp/subtitle_style.json", "w") as f:
                  json.dump(style, f)
              with open("/tmp/burn_mode.txt", "w") as f:
                  f.write(db_mode)
              with open("/tmp/clip_title.txt", "w") as f:
                  f.write(clip_title)
              print(f"Written files: mode={db_mode}, words={len(words)}", flush=True)
          PYEOF

      - name: Generate ASS subtitle file and burn
        env:
          BURN_MODE: ${{ inputs.mode }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          with open("/tmp/subtitle_data.json") as f:
              words = json.load(f)
          with open("/tmp/subtitle_style.json") as f:
              style = json.load(f)
          try:
              with open("/tmp/clip_title.txt") as f:
                  clip_title = f.read().strip()
          except FileNotFoundError:
              clip_title = ""

          # mode: prefer file (set by fetch step), fall back to workflow input env
          try:
              with open("/tmp/burn_mode.txt") as f:
                  mode = f.read().strip() or "landscape"
          except FileNotFoundError:
              mode = os.environ.get("BURN_MODE", "landscape") or "landscape"

          # ── Read style fields ───────────────────────────────────────────────────
          animation    = style.get("animation", "word_highlight")
          font_family  = style.get("fontFamily", "Liberation Sans")
          try:
              font_size = int(style.get("fontSize", 40))
          except (TypeError, ValueError):
              font_size = 40
          font_weight  = style.get("fontWeight", "Black")
          italic       = bool(style.get("italic", False))
          underline    = bool(style.get("underline", False))
          uppercase    = bool(style.get("uppercase", True))
          stroke_color = style.get("strokeColor", "#000000")
          shadow_on    = bool(style.get("shadowEnabled", False))
          shadow_y     = float(style.get("shadowY", 2))
          primary_hex  = style.get("primaryColor", "#FFFFFF")
          highlight_hex= style.get("highlightColor", "#04F827")
          position     = style.get("position", "bottom")
          try:
              stroke_width = int(style.get("strokeWidth", 8))
          except (TypeError, ValueError):
              stroke_width = 8
          try:
              lines = int(style.get("lines", 1))
          except (TypeError, ValueError):
              lines = 1

          # ── Get source video dimensions ─────────────────────────────────────────
          probe = subprocess.run(
              ["ffprobe", "-v", "error", "-select_streams", "v:0",
               "-show_entries", "stream=width,height",
               "-of", "csv=p=0", "/tmp/clip.mp4"],
              capture_output=True, text=True
          )
          dims_str = probe.stdout.strip().split(",")
          try:
              src_w, src_h = int(dims_str[0]), int(dims_str[1])
          except (ValueError, IndexError):
              src_w, src_h = 1920, 1080

          dur_probe = subprocess.run(
              ["ffprobe", "-v", "error", "-show_entries", "format=duration",
               "-of", "csv=p=0", "/tmp/clip.mp4"],
              capture_output=True, text=True
          )
          try:
              clip_duration = float(dur_probe.stdout.strip())
          except (ValueError, AttributeError):
              clip_duration = 9999.0

          print(f"Source dimensions: {src_w}x{src_h}, duration: {clip_duration:.1f}s, mode: {mode}", flush=True)

          # ── Compute portrait dimensions for portrait_blur mode ──────────────────
          TW, TH = 1080, 1920  # target 9:16

          if mode == "portrait_blur":
              # Background: scale to fill TW×TH (maintaining aspect), crop center
              # Need: both width >= TW and height >= TH
              scale_by_h_w = int(src_w * TH / src_h)
              scale_by_w_h = int(src_h * TW / src_w)
              if scale_by_h_w >= TW:
                  bg_w = scale_by_h_w + (scale_by_h_w % 2)
                  bg_h = TH
              else:
                  bg_w = TW
                  bg_h = scale_by_w_h + (scale_by_w_h % 2)
              bg_crop_x = max(0, (bg_w - TW) // 2)
              bg_crop_y = max(0, (bg_h - TH) // 2)

              # Foreground: fit width to TW, height proportional
              fg_w = TW
              fg_h = int(src_h * TW / src_w)
              fg_h = fg_h - (fg_h % 2)  # ensure even

              play_res_x, play_res_y = TW, TH
              print(f"Portrait blur: bg={bg_w}x{bg_h} crop_x={bg_crop_x} crop_y={bg_crop_y}, fg={fg_w}x{fg_h}", flush=True)
          else:
              play_res_x, play_res_y = src_w, src_h

          # ── Hex → ASS BGR ───────────────────────────────────────────────────────
          def hex_to_ass(h):
              h = h.lstrip("#")[:6].upper().zfill(6)
              r, g, b = h[0:2], h[2:4], h[4:6]
              return f"&H00{b}{g}{r}"

          text_color      = hex_to_ass(primary_hex)
          highlight_color = hex_to_ass(highlight_hex)
          outline_color   = hex_to_ass(stroke_color)

          bold         = 1 if font_weight in ("Bold", "Black") else 0
          ass_italic   = 1 if italic else 0
          ass_underline= 1 if underline else 0
          shadow_depth = round(shadow_y) if shadow_on else 0

          if position in ("auto", "bottom"):
              valign, margin_v = 2, 30
          elif position == "top":
              valign, margin_v = 8, 30
          else:
              valign, margin_v = 5, 0

          ass_header = "\n".join([
              "[Script Info]",
              "ScriptType: v4.00+",
              f"PlayResX: {play_res_x}",
              f"PlayResY: {play_res_y}",
              "ScaledBorderAndShadow: yes",
              "",
              "[V4+ Styles]",
              "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding",
              f"Style: Default,{font_family},{font_size},{text_color},&H000000FF,{outline_color},&H80000000,{bold},{ass_italic},{ass_underline},0,100,100,0,0,1,{stroke_width},{shadow_depth},{valign},10,10,{margin_v},1",
              "Style: Title,Montserrat,48,&H00000000,&H000000FF,&H00FFFFFF,&H00FFFFFF,1,0,0,0,100,100,0,0,3,15,0,8,25,25,25,1",
              "",
              "[Events]",
              "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text",
              "",
          ])

          def fmt_time(s):
              h = int(s // 3600)
              m = int((s % 3600) // 60)
              sec = s % 60
              return f"{h}:{m:02d}:{sec:06.3f}".replace(".", ",")

          def esc(t):
              return t.replace("\\", "\\\\").replace("{", "\\{").replace("}", "\\}")

          def apply_case(t):
              return t.upper() if uppercase else t

          events = []
          WORDS_PER_GROUP = 4 if lines == 1 else 8

          if words and animation == "word_highlight":
              groups = [words[i:i+WORDS_PER_GROUP] for i in range(0, len(words), WORDS_PER_GROUP)]
              for group in groups:
                  if not group:
                      continue
                  for active_idx, active_word in enumerate(group):
                      w_start = active_word["start"]
                      w_end   = active_word["end"]
                      parts = []
                      for j, w in enumerate(group):
                          word_text = apply_case(esc(w["word"]))
                          if j == active_idx:
                              parts.append(f"{{\\c{highlight_color}}}{word_text}{{\\c{text_color}}}")
                          else:
                              parts.append(word_text)
                      text = " ".join(parts)
                      events.append(f"Dialogue: 0,{fmt_time(w_start)},{fmt_time(w_end)},Default,,0,0,0,,{text}")

          elif words and animation == "line":
              groups = [words[i:i+WORDS_PER_GROUP] for i in range(0, len(words), WORDS_PER_GROUP)]
              for group in groups:
                  if not group:
                      continue
                  line_start = group[0]["start"]
                  line_end   = group[-1]["end"]
                  text = " ".join(apply_case(esc(w["word"])) for w in group)
                  events.append(f"Dialogue: 0,{fmt_time(line_start)},{fmt_time(line_end)},Default,,0,0,0,,{text}")

          # Title overlay — white box with black text, shown for full clip duration
          def esc_title(t):
              return t.replace("\\", "\\\\").replace("{", "\\{").replace("}", "\\}").replace("\n", "\\N")

          title_events = []
          if clip_title:
              title_events.append(
                  f"Dialogue: 0,{fmt_time(0)},{fmt_time(clip_duration)},Title,,0,0,0,,{esc_title(clip_title)}"
              )

          all_events = title_events + events
          ass_content = ass_header + "\n".join(all_events)
          with open("/tmp/subtitles.ass", "w", encoding="utf-8") as f:
              f.write(ass_content)

          print(f"ASS: animation={animation}, {len(events)} word-events, title={'yes' if title_events else 'no'}, font={font_family}", flush=True)

          has_word_subs = bool(events) and animation != "none"
          has_subs = has_word_subs or bool(title_events)

          # ── Build FFmpeg command ────────────────────────────────────────────────
          if mode == "portrait_blur":
              # Build filter_complex for 9:16 blur background conversion
              bg_chain = f"[0:v]scale={bg_w}:{bg_h},crop={TW}:{TH}:{bg_crop_x}:{bg_crop_y},boxblur=20:4[bg]"
              fg_chain = f"[0:v]scale={fg_w}:{fg_h}[fg]"
              if has_subs:
                  compose = f"[bg][fg]overlay=(W-w)/2:(H-h)/2,ass=/tmp/subtitles.ass[out]"
              else:
                  compose = f"[bg][fg]overlay=(W-w)/2:(H-h)/2[out]"

              filter_complex = f"{bg_chain};{fg_chain};{compose}"

              proc = subprocess.run([
                  "ffmpeg", "-i", "/tmp/clip.mp4",
                  "-filter_complex", filter_complex,
                  "-map", "[out]",
                  "-map", "0:a:0?",
                  "-c:v", "libx264", "-preset", "fast", "-crf", "23",
                  "-pix_fmt", "yuv420p", "-r", "30",
                  "-c:a", "aac", "-b:a", "128k", "-ar", "48000",
                  "-movflags", "+faststart",
                  "/tmp/burned.mp4", "-y"
              ], capture_output=True, text=True)
          else:
              # Landscape: just burn subtitles (or copy if none)
              if not has_subs:
                  import shutil
                  shutil.copy("/tmp/clip.mp4", "/tmp/burned.mp4")
                  print("No subtitles — copying source", flush=True)
                  exit(0)

              proc = subprocess.run([
                  "ffmpeg", "-i", "/tmp/clip.mp4",
                  "-vf", "ass=/tmp/subtitles.ass",
                  "-c:v", "libx264", "-preset", "fast", "-crf", "23",
                  "-pix_fmt", "yuv420p", "-r", "30",
                  "-c:a", "copy", "-movflags", "+faststart",
                  "/tmp/burned.mp4", "-y"
              ], capture_output=True, text=True)

          if proc.returncode != 0:
              print(f"FFmpeg stderr (last 1000 chars):\n{proc.stderr[-1000:]}", flush=True)
              raise RuntimeError(f"FFmpeg processing failed (rc={proc.returncode})")

          if not os.path.exists("/tmp/burned.mp4") or os.path.getsize("/tmp/burned.mp4") == 0:
              raise RuntimeError("Output file missing or empty")

          print(f"Output: {os.path.getsize('/tmp/burned.mp4'):,} bytes", flush=True)
          PYEOF

      - name: Upload burned clip to Supabase Storage
        run: |
          FILE_SIZE=$(stat -c%s /tmp/burned.mp4)
          HTTP_STATUS=$(curl -sS -o /tmp/burn_upload_resp.txt -w "%{http_code}" \
            --max-time 300 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips/${{ inputs.output_path }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @/tmp/burned.mp4)

          echo "Upload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed:"
            cat /tmp/burn_upload_resp.txt
            exit 1
          fi
          echo "BURNED_FILE_SIZE=${FILE_SIZE}" >> $GITHUB_ENV

      - name: Create uploads row and mark burn done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEAM_ID: ${{ inputs.team_id }}
          USER_ID: ${{ inputs.user_id }}
          BURN_JOB_ID: ${{ inputs.burn_job_id }}
          OUTPUT_PATH: ${{ inputs.output_path }}
          BURNED_FILE_SIZE: ${{ env.BURNED_FILE_SIZE }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import uuid
          import datetime
          import urllib.request
          import urllib.error

          supabase_url = os.environ["SUPABASE_URL"]
          service_key = os.environ["SERVICE_KEY"]
          team_id = os.environ["TEAM_ID"]
          user_id = os.environ["USER_ID"]
          burn_job_id = os.environ["BURN_JOB_ID"]
          output_path = os.environ["OUTPUT_PATH"]
          file_size = int(os.environ.get("BURNED_FILE_SIZE", "0"))
          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          upload_id = str(uuid.uuid4())

          # Create uploads row
          payload = json.dumps({
              "id": upload_id,
              "user_id": user_id,
              "team_id": team_id,
              "bucket": "clips",
              "file_path": output_path,
              "file_size": file_size,
              "storage_deleted": False,
          }).encode()

          req = urllib.request.Request(
              f"{supabase_url}/rest/v1/uploads",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {service_key}",
                  "apikey": service_key,
                  "Content-Type": "application/json",
                  "Prefer": "return=minimal",
              }
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Created upload row: {upload_id} (HTTP {resp.status})", flush=True)
          except urllib.error.HTTPError as e:
              print(f"Upload row error: {e.code} {e.read()[:200]}", flush=True)
              raise

          # Mark burn job done
          done_payload = json.dumps({
              "status": "done",
              "result_upload_id": upload_id,
              "updated_at": now,
          }).encode()

          req2 = urllib.request.Request(
              f"{supabase_url}/rest/v1/ai_clip_burn_jobs?id=eq.{burn_job_id}",
              data=done_payload,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {service_key}",
                  "apikey": service_key,
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(req2) as resp:
              print(f"Marked burn done: HTTP {resp.status}", flush=True)
          PYEOF

      - name: Mark burn failed on error
        if: failure()
        run: |
          if [ ! -s /tmp/clip.mp4 ]; then
            DL_STATUS=$(cat /tmp/dl_status.txt 2>/dev/null || echo "no-response")
            CLIP_PATH=$(cat /tmp/clip_path.txt 2>/dev/null || echo "")
            ERR_MSG="Download failed (status: ${DL_STATUS}${CLIP_PATH:+, path: ${CLIP_PATH}}). Check Actions log."
          elif [ ! -s /tmp/burned.mp4 ]; then
            ERR_MSG="FFmpeg processing failed. Check Actions log for details."
          else
            ERR_MSG="Burn upload or finalization failed."
          fi
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_burn_jobs?id=eq.${{ inputs.burn_job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"error\":\"${ERR_MSG}\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
