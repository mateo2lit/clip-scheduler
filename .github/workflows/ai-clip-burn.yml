name: AI Clip Burn (Subtitle Burn-In)

on:
  workflow_dispatch:
    inputs:
      burn_job_id:
        description: "ai_clip_burn_jobs row ID"
        required: true
      source_clip_path:
        description: "Supabase Storage path of source clip"
        required: true
      output_path:
        description: "Supabase Storage path for burned output"
        required: true
      subtitle_json:
        description: "JSON array of word segments [{start, end, word}]"
        required: true
        default: "[]"
      style_json:
        description: "JSON subtitle style config"
        required: true
        default: "{}"
      team_id:
        description: "Team ID"
        required: true
      user_id:
        description: "User ID"
        required: true

jobs:
  burn:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check ffmpeg
        run: |
          if command -v ffmpeg &>/dev/null; then
            echo "ffmpeg ready: $(ffmpeg -version 2>&1 | head -1)"
          else
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi

      - name: Install fonts
        run: |
          mkdir -p /usr/local/share/fonts/clip-dash
          BASE="https://github.com/google/fonts/raw/main/ofl"
          wget -q "${BASE}/montserrat/static/Montserrat-Regular.ttf" -O /usr/local/share/fonts/clip-dash/Montserrat-Regular.ttf
          wget -q "${BASE}/montserrat/static/Montserrat-Bold.ttf"    -O /usr/local/share/fonts/clip-dash/Montserrat-Bold.ttf
          wget -q "${BASE}/montserrat/static/Montserrat-Black.ttf"   -O /usr/local/share/fonts/clip-dash/Montserrat-Black.ttf
          wget -q "${BASE}/oswald/static/Oswald-Regular.ttf"         -O /usr/local/share/fonts/clip-dash/Oswald-Regular.ttf
          wget -q "${BASE}/oswald/static/Oswald-Bold.ttf"            -O /usr/local/share/fonts/clip-dash/Oswald-Bold.ttf
          sudo apt-get install -y --no-install-recommends fonts-liberation 2>/dev/null || true
          fc-cache -fv
          echo "Installed fonts:"
          fc-list | grep -i "montserrat\|oswald\|liberation" || true

      - name: Mark burn job as burning
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_burn_jobs?id=eq.${{ inputs.burn_job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"burning\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Download source clip from Supabase Storage
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/clip.mp4 -w "%{http_code}" \
            --max-time 300 \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips/${{ inputs.source_clip_path }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")

          echo "Download status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "206" ]; then
            echo "Download failed with status $HTTP_STATUS"
            exit 1
          fi
          if [ ! -s /tmp/clip.mp4 ]; then
            echo "Downloaded clip is empty"
            exit 1
          fi

      - name: Generate ASS subtitle file and burn
        env:
          SUBTITLE_JSON: ${{ inputs.subtitle_json }}
          STYLE_JSON: ${{ inputs.style_json }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          words = json.loads(os.environ.get("SUBTITLE_JSON", "[]") or "[]")
          style = json.loads(os.environ.get("STYLE_JSON", "{}") or "{}")

          # ── Read style fields ──────────────────────────────────────────
          animation    = style.get("animation", "word_highlight")
          font_family  = style.get("fontFamily", "Montserrat")
          try:
              font_size = int(style.get("fontSize", 40))
          except (TypeError, ValueError):
              font_size = 40
          font_weight  = style.get("fontWeight", "Black")   # Regular|Bold|Black
          italic       = bool(style.get("italic", False))
          underline    = bool(style.get("underline", False))
          uppercase    = bool(style.get("uppercase", True))
          stroke_color = style.get("strokeColor", "#000000")
          shadow_on    = bool(style.get("shadowEnabled", False))
          _shadow_x    = float(style.get("shadowX", 2))   # ASS shadow is 1-axis; x/blur unused
          shadow_y     = float(style.get("shadowY", 2))
          _shadow_blur = float(style.get("shadowBlur", 2)) # ASS shadow is 1-axis; blur unused
          primary_hex  = style.get("primaryColor", "#FFFFFF")
          highlight_hex= style.get("highlightColor", "#04F827")
          position     = style.get("position", "bottom")   # auto|top|middle|bottom
          try:
              stroke_width = int(style.get("strokeWidth", 8))
          except (TypeError, ValueError):
              stroke_width = 8
          try:
              lines = int(style.get("lines", 1))        # 1 or 3
          except (TypeError, ValueError):
              lines = 1

          # ── Hex → ASS BGR ──────────────────────────────────────────────
          def hex_to_ass(h):
              h = h.lstrip("#")[:6].upper().zfill(6)
              r, g, b = h[0:2], h[2:4], h[4:6]
              return f"&H00{b}{g}{r}"

          text_color      = hex_to_ass(primary_hex)
          highlight_color = hex_to_ass(highlight_hex)
          outline_color   = hex_to_ass(stroke_color)

          # ── ASS style params ───────────────────────────────────────────
          bold      = 1 if font_weight in ("Bold", "Black") else 0
          ass_italic    = 1 if italic else 0
          ass_underline = 1 if underline else 0
          shadow_depth  = round(shadow_y) if shadow_on else 0

          # Vertical alignment: 2=bottom, 8=top, 5=middle
          if position in ("auto", "bottom"):
              valign, margin_v = 2, 30
          elif position == "top":
              valign, margin_v = 8, 30
          else:  # middle
              valign, margin_v = 5, 0

          # ── ASS header ─────────────────────────────────────────────────
          ass_header = "\n".join([
              "[Script Info]",
              "ScriptType: v4.00+",
              "PlayResX: 1080",
              "PlayResY: 1920",
              "ScaledBorderAndShadow: yes",
              "",
              "[V4+ Styles]",
              "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding",
              f"Style: Default,{font_family},{font_size},{text_color},&H000000FF,{outline_color},&H80000000,{bold},{ass_italic},{ass_underline},0,100,100,0,0,1,{stroke_width},{shadow_depth},{valign},10,10,{margin_v},1",
              "",
              "[Events]",
              "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text",
              "",
          ])

          def fmt_time(s):
              h = int(s // 3600)
              m = int((s % 3600) // 60)
              sec = s % 60
              return f"{h}:{m:02d}:{sec:06.3f}".replace(".", ",")

          def esc(t):
              return t.replace("\\", "\\\\").replace("{", "\\{").replace("}", "\\}")

          def apply_case(t):
              return t.upper() if uppercase else t

          events = []

          # Words per group: 1-line mode = 4 words, 3-line mode = 8 words
          WORDS_PER_GROUP = 4 if lines == 1 else 8

          if not words or animation == "none":
              ass_content = ass_header

          elif animation == "word_highlight":
              groups = [words[i:i+WORDS_PER_GROUP] for i in range(0, len(words), WORDS_PER_GROUP)]
              for group in groups:
                  if not group:
                      continue
                  for active_idx, active_word in enumerate(group):
                      w_start = active_word["start"]
                      w_end   = active_word["end"]
                      parts = []
                      for j, w in enumerate(group):
                          word_text = apply_case(esc(w["word"]))
                          if j == active_idx:
                              parts.append(f"{{\\c{highlight_color}}}{word_text}{{\\c{text_color}}}")
                          else:
                              parts.append(word_text)
                      text = " ".join(parts)
                      events.append(f"Dialogue: 0,{fmt_time(w_start)},{fmt_time(w_end)},Default,,0,0,0,,{text}")
              ass_content = ass_header + "\n".join(events)

          elif animation == "line":
              groups = [words[i:i+WORDS_PER_GROUP] for i in range(0, len(words), WORDS_PER_GROUP)]
              for group in groups:
                  if not group:
                      continue
                  line_start = group[0]["start"]
                  line_end   = group[-1]["end"]
                  text = " ".join(apply_case(esc(w["word"])) for w in group)
                  events.append(f"Dialogue: 0,{fmt_time(line_start)},{fmt_time(line_end)},Default,,0,0,0,,{text}")
              ass_content = ass_header + "\n".join(events)

          else:
              ass_content = ass_header

          with open("/tmp/subtitles.ass", "w", encoding="utf-8") as f:
              f.write(ass_content)

          print(f"Generated ASS: animation={animation}, font={font_family} {font_weight}, {len(events)} events", flush=True)

          if animation == "none" or not words:
              import shutil
              shutil.copy("/tmp/clip.mp4", "/tmp/burned.mp4")
              print("No subtitles — copying source", flush=True)
          else:
              proc = subprocess.run([
                  "ffmpeg", "-i", "/tmp/clip.mp4",
                  "-vf", "ass=/tmp/subtitles.ass",
                  "-c:v", "libx264", "-preset", "fast", "-crf", "23",
                  "-pix_fmt", "yuv420p", "-r", "30",
                  "-c:a", "copy", "-movflags", "+faststart",
                  "/tmp/burned.mp4", "-y"
              ], capture_output=True, text=True)

              if proc.returncode != 0:
                  print(f"FFmpeg error: {proc.stderr[-800:]}", flush=True)
                  raise RuntimeError("Subtitle burn failed")

          if not os.path.exists("/tmp/burned.mp4") or os.path.getsize("/tmp/burned.mp4") == 0:
              raise RuntimeError("Burned output missing or empty")

          print(f"Output: {os.path.getsize('/tmp/burned.mp4'):,} bytes", flush=True)
          PYEOF

      - name: Upload burned clip to Supabase Storage
        run: |
          FILE_SIZE=$(stat -c%s /tmp/burned.mp4)
          HTTP_STATUS=$(curl -sS -o /tmp/burn_upload_resp.txt -w "%{http_code}" \
            --max-time 300 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips/${{ inputs.output_path }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @/tmp/burned.mp4)

          echo "Upload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed:"
            cat /tmp/burn_upload_resp.txt
            exit 1
          fi
          echo "BURNED_FILE_SIZE=${FILE_SIZE}" >> $GITHUB_ENV

      - name: Create uploads row and mark burn done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEAM_ID: ${{ inputs.team_id }}
          USER_ID: ${{ inputs.user_id }}
          BURN_JOB_ID: ${{ inputs.burn_job_id }}
          OUTPUT_PATH: ${{ inputs.output_path }}
          BURNED_FILE_SIZE: ${{ env.BURNED_FILE_SIZE }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import uuid
          import datetime
          import urllib.request
          import urllib.error

          supabase_url = os.environ["SUPABASE_URL"]
          service_key = os.environ["SERVICE_KEY"]
          team_id = os.environ["TEAM_ID"]
          user_id = os.environ["USER_ID"]
          burn_job_id = os.environ["BURN_JOB_ID"]
          output_path = os.environ["OUTPUT_PATH"]
          file_size = int(os.environ.get("BURNED_FILE_SIZE", "0"))
          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          upload_id = str(uuid.uuid4())

          # Create uploads row
          payload = json.dumps({
              "id": upload_id,
              "user_id": user_id,
              "team_id": team_id,
              "bucket": "clips",
              "file_path": output_path,
              "file_size": file_size,
              "storage_deleted": False,
          }).encode()

          req = urllib.request.Request(
              f"{supabase_url}/rest/v1/uploads",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {service_key}",
                  "apikey": service_key,
                  "Content-Type": "application/json",
                  "Prefer": "return=minimal",
              }
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Created upload row: {upload_id} (HTTP {resp.status})", flush=True)
          except urllib.error.HTTPError as e:
              print(f"Upload row error: {e.code} {e.read()[:200]}", flush=True)
              raise

          # Mark burn job done
          done_payload = json.dumps({
              "status": "done",
              "result_upload_id": upload_id,
              "updated_at": now,
          }).encode()

          req2 = urllib.request.Request(
              f"{supabase_url}/rest/v1/ai_clip_burn_jobs?id=eq.{burn_job_id}",
              data=done_payload,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {service_key}",
                  "apikey": service_key,
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(req2) as resp:
              print(f"Marked burn done: HTTP {resp.status}", flush=True)
          PYEOF

      - name: Mark burn failed on error
        if: failure()
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_burn_jobs?id=eq.${{ inputs.burn_job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"error\":\"Subtitle burn failed\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
