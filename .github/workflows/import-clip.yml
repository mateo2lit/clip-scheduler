name: Import Clip

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "import_jobs row ID"
        required: true
      url:
        description: "Source clip URL"
        required: false
        default: ""
      team_id:
        description: "Team ID"
        required: true
      user_id:
        description: "User ID"
        required: true
      direct_url:
        description: "Direct video CDN URL (skips yt-dlp, used for Kick)"
        required: false
        default: ""
      prefetched_title:
        description: "Pre-fetched title (skips metadata step)"
        required: false
        default: ""
      prefetched_duration:
        description: "Pre-fetched duration in seconds"
        required: false
        default: "0"
      raw_ts_path:
        description: "Supabase Storage path to a pre-downloaded raw .ts file (HLS Kick clips). When set, skips CDN download and only remuxes to MP4."
        required: false
        default: ""

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          echo "=== Install step ===" | tee /tmp/download_log.txt
          echo "direct_url=${{ inputs.direct_url }}" | tee -a /tmp/download_log.txt
          sudo apt-get install -y ffmpeg -qq 2>&1 | tee -a /tmp/download_log.txt
          pip install --upgrade yt-dlp 2>&1 | tee -a /tmp/download_log.txt
          pip install --upgrade curl_cffi 2>&1 | tee -a /tmp/download_log.txt || echo "curl_cffi optional install skipped" | tee -a /tmp/download_log.txt
          echo "Install complete" | tee -a /tmp/download_log.txt

      - name: Mark job as fetching
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/import_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"fetching\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Get clip metadata
        id: meta
        run: |
          if [ -n "${{ inputs.prefetched_title }}" ]; then
            echo "title=${{ inputs.prefetched_title }}" >> $GITHUB_OUTPUT
            echo "duration=${{ inputs.prefetched_duration }}" >> $GITHUB_OUTPUT
          else
            # || true prevents set -eo pipefail from killing the step if yt-dlp fails
            # (e.g. Kick URLs blocked from GitHub Actions datacenter IPs)
            JSON=$(yt-dlp --dump-json --no-playlist "${{ inputs.url }}" 2>/tmp/meta_err.txt | head -1) || true
            if [ -z "$JSON" ]; then
              echo "title=Imported clip" >> $GITHUB_OUTPUT
              echo "duration=0" >> $GITHUB_OUTPUT
            else
              TITLE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title','Imported clip')[:200].replace('\"','').replace(\"'\",\"\"))" 2>/dev/null || echo "Imported clip")
              DURATION=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('duration') or 0))" 2>/dev/null || echo "0")
              echo "title=${TITLE}" >> $GITHUB_OUTPUT
              echo "duration=${DURATION}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Mark job as uploading
        run: |
          SAFE_TITLE=$(echo "${{ steps.meta.outputs.title }}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))" | tr -d '\n')
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/import_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"uploading\",\"title\":${SAFE_TITLE},\"duration_seconds\":${{ steps.meta.outputs.duration }},\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Download clip
        run: |
          EFFECTIVE_DIRECT_URL="${{ inputs.direct_url }}"

          # ── Kick: direct_url is either a direct CDN URL (clips.kick.com via CloudFront,
          # accessible from GitHub Actions) or a Vercel-proxied URL (kick-video-proxy for
          # direct MP4 clips). HLS m3u8 URLs are passed straight through — ffmpeg handles
          # byte-range segment downloads natively against the CloudFront CDN.
          if [ -n "$EFFECTIVE_DIRECT_URL" ]; then
            echo "Using direct CDN URL" | tee -a /tmp/download_log.txt
            HTTP_STATUS=$(curl -L --max-time 600 --retry 2 \
              -H "Referer: https://kick.com/" \
              -o /tmp/clip_source \
              -w "%{http_code}" \
              "$EFFECTIVE_DIRECT_URL" \
              2>>/tmp/download_log.txt)
            echo "Direct download HTTP status: $HTTP_STATUS" | tee -a /tmp/download_log.txt
            if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "206" ]; then
              echo "Direct download failed with HTTP status $HTTP_STATUS" | tee -a /tmp/download_log.txt
              exit 1
            fi
            if [ ! -f /tmp/clip_source ] || [ ! -s /tmp/clip_source ]; then
              echo "Direct download produced no file" | tee -a /tmp/download_log.txt
              exit 1
            fi

            # Some Kick direct URLs are HLS playlists (m3u8), not MP4 binaries.
            # Detect and remux to a local MP4 first so downstream ffprobe/transcode works.
            if head -c 16 /tmp/clip_source | grep -q "#EXTM3U"; then
              echo "Direct URL returned HLS playlist; remuxing to MP4..." | tee -a /tmp/download_log.txt
              ffmpeg \
                -protocol_whitelist file,http,https,tcp,tls,crypto \
                -headers "Referer: https://kick.com/\r\nOrigin: https://kick.com\r\nUser-Agent: Mozilla/5.0\r\n" \
                -i "$EFFECTIVE_DIRECT_URL" \
                -c copy -bsf:a aac_adtstoasc \
                /tmp/clip_source_hls.mp4 -y \
                2>>/tmp/download_log.txt
              if [ ! -s /tmp/clip_source_hls.mp4 ]; then
                echo "Failed to remux HLS playlist from Kick URL" | tee -a /tmp/download_log.txt
                exit 1
              fi
              mv /tmp/clip_source_hls.mp4 /tmp/clip_source
            fi
          else
            yt-dlp \
              --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best[ext!=webm]/best" \
              --merge-output-format mp4 \
              --no-playlist \
              -o "/tmp/clip.%(ext)s" \
              "${{ inputs.url }}" \
              2>&1 | tee /tmp/download_log.txt

            EXIT_CODE=${PIPESTATUS[0]}
            if [ "$EXIT_CODE" != "0" ]; then
              # Fallback pass for YouTube bot-check cases on datacenter IPs.
              if echo "${{ inputs.url }}" | grep -qiE "youtube\.com|youtu\.be"; then
                echo "Primary yt-dlp pass failed; retrying with alternate YouTube client..." | tee -a /tmp/download_log.txt
                yt-dlp \
                  --extractor-args "youtube:player_client=android,web,tv_embedded" \
                  --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best[ext!=webm]/best" \
                  --merge-output-format mp4 \
                  --no-playlist \
                  -o "/tmp/clip.%(ext)s" \
                  "${{ inputs.url }}" \
                  2>&1 | tee -a /tmp/download_log.txt
                EXIT_CODE=${PIPESTATUS[0]}
              fi
              if [ "$EXIT_CODE" != "0" ]; then
                echo "yt-dlp exited with code $EXIT_CODE"
                exit 1
              fi
            fi

            CLIP_FILE=$(ls /tmp/clip.* 2>/dev/null | grep -v '\.txt$' | head -1)
            if [ -z "$CLIP_FILE" ]; then
              echo "Download failed - no output file found" | tee -a /tmp/download_log.txt
              exit 1
            fi

            cp "$CLIP_FILE" /tmp/clip_source
          fi

          # Validate source media (guards against HTML/error payloads saved as .mp4)
          if ! ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 /tmp/clip_source >/tmp/ffprobe_video.txt 2>/tmp/ffprobe_err.txt; then
            # Fallback for non-standard HLS responses: let yt-dlp resolve the direct URL.
            if [ -n "$EFFECTIVE_DIRECT_URL" ]; then
              echo "ffprobe failed on direct download; retrying via yt-dlp..." | tee -a /tmp/download_log.txt
              yt-dlp \
                --add-header "Referer: https://kick.com/" \
                --add-header "Origin: https://kick.com" \
                --no-playlist \
                -o "/tmp/clip_retry.%(ext)s" \
                "$EFFECTIVE_DIRECT_URL" \
                2>&1 | tee -a /tmp/download_log.txt
              RETRY_FILE=$(ls /tmp/clip_retry.* 2>/dev/null | grep -v '\.txt$' | head -1)
              if [ -n "$RETRY_FILE" ] && [ -s "$RETRY_FILE" ]; then
                cp "$RETRY_FILE" /tmp/clip_source
              fi
            fi
            if ! ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 /tmp/clip_source >/tmp/ffprobe_video.txt 2>/tmp/ffprobe_err.txt; then
              echo "Downloaded file is not a valid video stream" | tee -a /tmp/download_log.txt
              cat /tmp/ffprobe_err.txt | tail -3 | tee -a /tmp/download_log.txt
              exit 1
            fi
          fi
          if [ ! -s /tmp/ffprobe_video.txt ]; then
            echo "Downloaded file has no video stream" | tee -a /tmp/download_log.txt
            exit 1
          fi

          # Re-encode to H.264/AAC for broad compatibility (TikTok/Instagram safe baseline).
          # yuv420p + faststart improves compatibility and streaming ingest reliability.
          echo "Transcoding to H.264/AAC..." | tee -a /tmp/download_log.txt
          ffmpeg -i /tmp/clip_source \
            -map 0:v:0 -map 0:a:0? \
            -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -r 30 \
            -c:a aac -b:a 128k -ar 48000 -ac 2 \
            -movflags +faststart \
            /tmp/clip.mp4 -y \
            2>>/tmp/download_log.txt
          if [ ! -s /tmp/clip.mp4 ]; then
            echo "Transcode failed - output missing" | tee -a /tmp/download_log.txt
            tail -10 /tmp/download_log.txt
            exit 1
          fi

          # Enforce 2 GB limit post-transcode
          ACTUAL_SIZE=$(stat -c%s /tmp/clip.mp4)
          if [ "$ACTUAL_SIZE" -gt 2147483648 ]; then
            echo "File exceeds 2 GB limit ($ACTUAL_SIZE bytes)"
            exit 1
          fi

          echo "ACTUAL_SIZE=${ACTUAL_SIZE}" >> $GITHUB_ENV
      - name: Upload to Supabase Storage
        run: |
          FILE_PATH="${{ inputs.team_id }}/${{ inputs.job_id }}.mp4"

          HTTP_STATUS=$(curl -sS -o /tmp/upload_response.txt -w "%{http_code}" \
            --max-time 600 \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips/${FILE_PATH}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: video/mp4" \
            --data-binary @/tmp/clip.mp4)

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Storage upload failed with status $HTTP_STATUS:" | tee -a /tmp/download_log.txt
            cat /tmp/upload_response.txt | tee -a /tmp/download_log.txt
            exit 1
          fi

          echo "FILE_PATH=${FILE_PATH}" >> $GITHUB_ENV

      - name: Create uploads row and mark job done
        run: |
          UPLOAD_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Insert uploads row
          UPLOAD_STATUS=$(curl -sS -o /tmp/upload_row_response.txt -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/uploads" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"id\":\"${UPLOAD_ID}\",\"user_id\":\"${{ inputs.user_id }}\",\"team_id\":\"${{ inputs.team_id }}\",\"bucket\":\"clips\",\"file_path\":\"${FILE_PATH}\",\"file_size\":${ACTUAL_SIZE},\"storage_deleted\":false}")

          if [ "$UPLOAD_STATUS" != "201" ] && [ "$UPLOAD_STATUS" != "200" ]; then
            echo "Failed to create uploads row (status $UPLOAD_STATUS):"
            cat /tmp/upload_row_response.txt
            exit 1
          fi

          # Mark job done
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/import_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"done\",\"upload_id\":\"${UPLOAD_ID}\",\"updated_at\":\"${NOW}\"}"


      - name: Mark failed on error
        if: failure()
        run: |
          # Try to get a useful error snippet from logs
          ERR_MSG="Import failed - the URL may be unsupported, the clip unavailable, or it exceeded the 2 GB limit."
          for LOG in /tmp/download_log.txt /tmp/meta_err.txt; do
            if [ -f "$LOG" ] && [ -s "$LOG" ]; then
              SNIPPET=$(tail -3 "$LOG" | tr '\n' ' ' | sed 's/["\]//g' | cut -c1-250)
              if [ -n "$SNIPPET" ]; then
                ERR_MSG="$SNIPPET"
                break
              fi
            fi
          done

          # Normalize known provider-specific failures into user-friendly messages.
          if grep -qiE "Sign in to confirm|confirm you're not a bot|confirm youre not a bot" /tmp/download_log.txt 2>/dev/null; then
            ERR_MSG="YouTube blocked automated download for this video (anti-bot check). Try another video, upload the file directly, or use a public clip URL."
          fi

          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/import_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"error\":\"${ERR_MSG}\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
