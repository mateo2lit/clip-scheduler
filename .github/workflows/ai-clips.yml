name: AI Clips

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "ai_clip_jobs row ID"
        required: true
      source_file_path:
        description: "Supabase Storage path of source video (leave empty if using source_url)"
        required: false
        default: ""
      source_bucket:
        description: "Storage bucket name"
        required: false
        default: "clips"
      source_url:
        description: "YouTube or Twitch URL (alternative to source_file_path)"
        required: false
        default: ""
      team_id:
        description: "Team ID"
        required: true
      user_id:
        description: "User ID"
        required: true
      clip_count:
        description: "Number of clips to generate (3-10)"
        required: true
        default: "5"
      genre:
        description: "Video genre (auto/podcast/gaming/sports/education/interview/news)"
        required: false
        default: "auto"
      clip_length:
        description: "Clip duration (auto/short/medium/long)"
        required: false
        default: "auto"
      auto_hook:
        description: "Include auto hook clip"
        required: false
        default: "true"
      moment_prompt:
        description: "Specific moments to find"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ai-clips-team-${{ inputs.team_id }}
      cancel-in-progress: false

    steps:
      - name: Install dependencies
        run: |
          # ffmpeg is pre-installed on ubuntu-latest runners; check before installing
          if command -v ffmpeg &>/dev/null; then
            echo "ffmpeg ready: $(ffmpeg -version 2>&1 | head -1)"
          else
            echo "ffmpeg not found, installing..."
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi
          pip install faster-whisper anthropic yt-dlp 2>&1 | tail -5

      - name: Acquire source video
        run: |
          SOURCE_URL="${{ inputs.source_url }}"

          if [ -n "$SOURCE_URL" ]; then
            echo "Downloading from URL: $SOURCE_URL"
            yt-dlp \
              -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
              --merge-output-format mp4 \
              --max-filesize 4G \
              -o /tmp/source.mp4 \
              "$SOURCE_URL"
          else
            echo "Downloading from Supabase Storage: ${{ inputs.source_file_path }}"
            HTTP_STATUS=$(curl -sS -o /tmp/source.mp4 -w "%{http_code}" \
              --max-time 600 \
              "${{ secrets.SUPABASE_URL }}/storage/v1/object/${{ inputs.source_bucket }}/${{ inputs.source_file_path }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")

            echo "Download HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "206" ]; then
              echo "Download failed with HTTP status $HTTP_STATUS"
              exit 1
            fi
          fi

          if [ ! -s /tmp/source.mp4 ]; then
            echo "Source file is empty or missing"
            exit 1
          fi
          echo "Source size: $(stat -c%s /tmp/source.mp4) bytes"

          # Update actual duration in DB (important for URL-sourced jobs)
          DURATION_SECS=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 /tmp/source.mp4 2>/dev/null || echo "0")
          DURATION_MINS=$(python3 -c "d=float('${DURATION_SECS}' or '0'); print(round(d/60,1))")
          echo "Duration: ${DURATION_MINS} min"
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"source_duration_minutes\":${DURATION_MINS},\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Mark job as transcribing
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"transcribing\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Extract audio and transcribe with word timestamps
        env:
          CLIP_COUNT: ${{ inputs.clip_count }}
        run: |
          # Extract audio at 16kHz mono WAV for Whisper
          ffmpeg -i /tmp/source.mp4 \
            -vn -ar 16000 -ac 1 -f wav \
            /tmp/audio.wav -y \
            2>/tmp/ffmpeg_audio_log.txt

          if [ ! -s /tmp/audio.wav ]; then
            echo "Audio extraction failed"
            tail -5 /tmp/ffmpeg_audio_log.txt
            exit 1
          fi

          python3 - <<'PYEOF'
          import sys
          import json
          from faster_whisper import WhisperModel

          print("Loading Whisper base model...", flush=True)
          model = WhisperModel("base", device="cpu", compute_type="int8")
          print("Transcribing with word timestamps...", flush=True)

          segments, info = model.transcribe(
              "/tmp/audio.wav",
              beam_size=5,
              language=None,
              vad_filter=True,
              word_timestamps=True,
          )

          transcript_lines = []
          all_words = []

          for seg in segments:
              transcript_lines.append(f"[{seg.start:.1f}s-{seg.end:.1f}s] {seg.text.strip()}")
              print(f"  {seg.start:.1f}s: {seg.text.strip()[:80]}", flush=True)
              if seg.words:
                  for w in seg.words:
                      all_words.append({
                          "start": round(w.start, 3),
                          "end": round(w.end, 3),
                          "word": w.word.strip(),
                      })

          transcript = "\n".join(transcript_lines) if transcript_lines else "[No speech detected]"

          with open("/tmp/transcript.txt", "w") as f:
              f.write(transcript)

          with open("/tmp/word_segments.json", "w") as f:
              json.dump(all_words, f)

          print(f"Transcript: {len(transcript_lines)} segments, {len(all_words)} words", flush=True)
          PYEOF

      - name: Mark job as detecting
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"detecting\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Detect best moments with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLIP_COUNT: ${{ inputs.clip_count }}
          GENRE: ${{ inputs.genre }}
          CLIP_LENGTH: ${{ inputs.clip_length }}
          AUTO_HOOK: ${{ inputs.auto_hook }}
          MOMENT_PROMPT: ${{ inputs.moment_prompt }}
        run: |
          python3 - <<'PYEOF'
          import anthropic
          import json
          import os
          import subprocess

          clip_count = int(os.environ.get("CLIP_COUNT", "5"))
          genre = os.environ.get("GENRE", "auto") or "auto"
          clip_length = os.environ.get("CLIP_LENGTH", "auto") or "auto"
          auto_hook = os.environ.get("AUTO_HOOK", "true").lower() in ("true", "1", "yes")
          moment_prompt = os.environ.get("MOMENT_PROMPT", "").strip()

          # Clip duration constraints based on clip_length setting
          length_map = {
              "short":  (15, 45),
              "medium": (45, 90),
              "long":   (90, 180),
          }
          min_secs, max_secs = length_map.get(clip_length, (30, 120))

          with open("/tmp/transcript.txt") as f:
              transcript = f.read()

          # Get video duration
          result = subprocess.run(
              ["ffprobe", "-v", "error", "-show_entries", "format=duration",
               "-of", "default=noprint_wrappers=1:nokey=1", "/tmp/source.mp4"],
              capture_output=True, text=True
          )
          total_duration = float(result.stdout.strip() or "0")
          print(f"Video duration: {total_duration:.1f}s", flush=True)

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          genre_context = f"This is a {genre} video. " if genre != "auto" else ""
          hook_rule = "- At least one clip should begin with a strong hook or attention-grabbing opening\n" if auto_hook else ""
          moment_rule = f"- Prioritize finding moments about: {moment_prompt}\n" if moment_prompt else ""

          prompt = (
              f"You are analyzing a video transcript to find the {clip_count} best moments for short-form social media clips (TikTok, Instagram Reels, YouTube Shorts).\n"
              f"{genre_context}\n"
              f"Video duration: {total_duration:.0f} seconds\n"
              f"Transcript (format: [start-end] text):\n"
              f"{transcript[:8000]}\n\n"
              f"Find exactly {clip_count} distinct, engaging moments. Each clip must be {min_secs}-{max_secs} seconds long.\n\n"
              "Rules:\n"
              "- Clips must not overlap\n"
              f"- Start/end times must be within 0 to {total_duration:.0f} seconds\n"
              "- Prefer: high energy moments, key insights, funny/surprising moments, strong hooks\n"
              f"{hook_rule}"
              f"{moment_rule}"
              "- If transcript is sparse/silent, space clips evenly across the video\n"
              "- Title should be 5-10 words, compelling, suitable for social media\n\n"
              "Respond with ONLY valid JSON (no markdown, no code blocks):\n"
              '[{"start": 45.2, "end": 98.7, "title": "Compelling title here"}, ...]\n\n'
              f"Return exactly {clip_count} items."
          )

          msg = client.messages.create(
              model="claude-haiku-4-5-20251001",
              max_tokens=1024,
              messages=[{"role": "user", "content": prompt}]
          )

          text = msg.content[0].text if msg.content else ""
          print(f"Claude response preview: {text[:300]}", flush=True)

          # Clean and parse JSON
          cleaned = text.replace("```json", "").replace("```", "").strip()
          try:
              moments = json.loads(cleaned)
              if not isinstance(moments, list):
                  raise ValueError("Not a list")
          except (json.JSONDecodeError, ValueError) as e:
              print(f"JSON parse error: {e} — using evenly spaced fallback", flush=True)
              clip_dur = min(60.0, total_duration / clip_count)
              moments = []
              for i in range(clip_count):
                  start = (total_duration / clip_count) * i
                  moments.append({
                      "start": round(start, 1),
                      "end": round(min(start + clip_dur, total_duration), 1),
                      "title": f"Clip {i + 1}"
                  })

          # Validate and clamp each moment
          validated = []
          for i, m in enumerate(moments[:clip_count]):
              start = max(0.0, float(m.get("start", 0)))
              end = min(total_duration, float(m.get("end", start + 60)))
              # Enforce max 120s
              if end - start > 120:
                  end = start + 120
              # Enforce min 5s
              if end - start < 5:
                  end = min(start + 30, total_duration)
              title = str(m.get("title", f"Clip {i + 1}"))[:200]
              validated.append({"start": round(start, 1), "end": round(end, 1), "title": title})

          # Pad if Claude returned fewer than requested
          while len(validated) < clip_count:
              i = len(validated)
              start = round((total_duration / clip_count) * i, 1)
              end = round(min(start + 60, total_duration), 1)
              validated.append({"start": start, "end": end, "title": f"Clip {i + 1}"})

          with open("/tmp/moments.json", "w") as f:
              json.dump(validated, f, indent=2)

          print(f"Moments saved ({len(validated)} clips):", flush=True)
          for m in validated:
              print(f"  {m['start']:.1f}s-{m['end']:.1f}s ({m['end']-m['start']:.1f}s): {m['title']}", flush=True)
          PYEOF

      - name: Mark job as cutting
        run: |
          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"cutting\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      - name: Cut clips and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEAM_ID: ${{ inputs.team_id }}
          USER_ID: ${{ inputs.user_id }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import subprocess
          import uuid
          import urllib.request
          import urllib.error

          supabase_url = os.environ["SUPABASE_URL"]
          service_key = os.environ["SERVICE_KEY"]
          team_id = os.environ["TEAM_ID"]
          user_id = os.environ["USER_ID"]
          job_id = os.environ["JOB_ID"]

          with open("/tmp/moments.json") as f:
              moments = json.load(f)

          with open("/tmp/word_segments.json") as f:
              all_words = json.load(f)

          result_upload_ids = []
          result_titles = []
          result_subtitles = []

          for i, moment in enumerate(moments):
              start = moment["start"]
              end = moment["end"]
              title = moment["title"]
              duration = min(end - start, 120.0)
              out_path = f"/tmp/clip_{i}.mp4"

              print(f"\nCutting clip {i+1}/{len(moments)}: {start:.1f}s-{end:.1f}s ({duration:.1f}s)", flush=True)
              print(f"  Title: {title}", flush=True)

              # FFmpeg cut + transcode (same flags as import-clip.yml)
              proc = subprocess.run([
                  "ffmpeg",
                  "-ss", str(start),
                  "-i", "/tmp/source.mp4",
                  "-t", str(duration),
                  "-map", "0:v:0",
                  "-map", "0:a:0?",
                  "-c:v", "libx264",
                  "-preset", "fast",
                  "-crf", "23",
                  "-pix_fmt", "yuv420p",
                  "-r", "30",
                  "-c:a", "aac",
                  "-b:a", "128k",
                  "-ar", "48000",
                  "-ac", "2",
                  "-movflags", "+faststart",
                  out_path, "-y"
              ], capture_output=True, text=True)

              if proc.returncode != 0:
                  print(f"FFmpeg error: {proc.stderr[-500:]}", flush=True)
                  raise RuntimeError(f"FFmpeg cut failed for clip {i+1}")

              if not os.path.exists(out_path) or os.path.getsize(out_path) == 0:
                  raise RuntimeError(f"Output missing for clip {i+1}")

              file_size = os.path.getsize(out_path)
              print(f"  Output: {file_size:,} bytes", flush=True)

              # Upload to Supabase Storage
              storage_path = f"{team_id}/ai_{job_id}_{i}.mp4"
              storage_url = f"{supabase_url}/storage/v1/object/clips/{storage_path}"

              with open(out_path, "rb") as f:
                  data = f.read()

              req = urllib.request.Request(
                  storage_url,
                  data=data,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {service_key}",
                      "Content-Type": "video/mp4",
                  }
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      upload_status = resp.status
              except urllib.error.HTTPError as e:
                  upload_status = e.code
                  print(f"  Storage upload response: {e.read()[:200]}", flush=True)

              if upload_status not in (200, 201):
                  raise RuntimeError(f"Storage upload failed (HTTP {upload_status}) for clip {i+1}")

              # Create uploads row
              upload_id = str(uuid.uuid4())
              uploads_url = f"{supabase_url}/rest/v1/uploads"
              payload = json.dumps({
                  "id": upload_id,
                  "user_id": user_id,
                  "team_id": team_id,
                  "bucket": "clips",
                  "file_path": storage_path,
                  "file_size": file_size,
                  "storage_deleted": False,
              }).encode()

              req2 = urllib.request.Request(
                  uploads_url,
                  data=payload,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {service_key}",
                      "apikey": service_key,
                      "Content-Type": "application/json",
                      "Prefer": "return=minimal",
                  }
              )
              try:
                  with urllib.request.urlopen(req2) as resp:
                      row_status = resp.status
              except urllib.error.HTTPError as e:
                  row_status = e.code
                  print(f"  Uploads row response: {e.read()[:200]}", flush=True)

              if row_status not in (200, 201):
                  raise RuntimeError(f"Failed to create uploads row (HTTP {row_status}) for clip {i+1}")

              # Extract per-clip word segments (relative timestamps)
              clip_words = [
                  {"start": round(w["start"] - start, 3),
                   "end": round(w["end"] - start, 3),
                   "word": w["word"]}
                  for w in all_words
                  if w["start"] >= start and w["end"] <= end
              ]

              result_upload_ids.append(upload_id)
              result_titles.append(title)
              result_subtitles.append(clip_words)

              print(f"  Created upload {upload_id} ({len(clip_words)} subtitle words)", flush=True)
              os.remove(out_path)

          # Save results for the done step
          with open("/tmp/ai_clips_results.json", "w") as f:
              json.dump({
                  "result_upload_ids": result_upload_ids,
                  "result_titles": result_titles,
                  "result_subtitles": result_subtitles,
              }, f)

          print(f"\nAll {len(result_upload_ids)} clips created successfully", flush=True)
          PYEOF

      - name: Delete source video from Storage
        run: |
          # Clean up the temporary source file — it's no longer needed
          curl -sS -X DELETE \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[\"${{ inputs.source_file_path }}\"]" \
            || echo "Source cleanup failed (non-fatal)"

      - name: Mark job as done
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import datetime
          import urllib.request

          supabase_url = "${{ secrets.SUPABASE_URL }}"
          service_key = "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          job_id = "${{ inputs.job_id }}"

          with open("/tmp/ai_clips_results.json") as f:
              results = json.load(f)

          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          payload = json.dumps({
              "status": "done",
              "clips_generated": len(results["result_upload_ids"]),
              "result_upload_ids": results["result_upload_ids"],
              "result_titles": results["result_titles"],
              "result_subtitles": results["result_subtitles"],
              "updated_at": now,
          }).encode()

          req = urllib.request.Request(
              f"{supabase_url}/rest/v1/ai_clip_jobs?id=eq.{job_id}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {service_key}",
                  "apikey": service_key,
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Marked done: HTTP {resp.status}", flush=True)
          PYEOF

      - name: Mark failed on error
        if: failure()
        run: |
          ERR_MSG="AI clip generation failed."
          for LOG in /tmp/ffmpeg_audio_log.txt; do
            if [ -f "$LOG" ] && [ -s "$LOG" ]; then
              SNIPPET=$(tail -3 "$LOG" | tr '\n' ' ' | sed 's/["\]//g' | cut -c1-250)
              if [ -n "$SNIPPET" ]; then
                ERR_MSG="$SNIPPET"
              fi
            fi
          done

          # Also try to delete the source file on failure
          curl -sS -X DELETE \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/clips" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[\"${{ inputs.source_file_path }}\"]" \
            || true

          curl -sS -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ai_clip_jobs?id=eq.${{ inputs.job_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"error\":\"${ERR_MSG}\",\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
